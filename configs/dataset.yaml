# Dataset definition — EDIT THIS for your mission.
# Class order defines the integer ids used in labels (0-based). Never reorder
# after labeling starts — it silently remaps every existing label.
#
# CURRENT DATA = VisDrone-DET baseline (prototyping only). scripts/convert_visdrone.py
# emits VisDrone category-1 as class id 0 .. category-10 as class id 9, so the data
# on disk has 10 classes (ids 0..9). Train/validate/predict with --num-classes 10.
# Passing --num-classes 5 here would make validate.py reject every box of ids 5..9
# and silently mislabel the rest — do NOT do that.
#
# When you switch to your own altitude-matched mission data (person-focused, see
# docs/DATA_PLAN.md), REPLACE this list with your real mission classes and re-pin.

names:
  0: pedestrian        # VisDrone: a person walking/standing
  1: people            # VisDrone: a person in other pose (sitting, etc.)
  2: bicycle
  3: car
  4: van
  5: truck
  6: tricycle
  7: awning-tricycle
  8: bus
  9: motor             # motorcycle / scooter

# Filled in by scripts/ingest_dataset.py — do not edit by hand.
paths:
  train_images: data/train/images
  train_labels: data/train/labels
  val_images: data/val/images
  val_labels: data/val/labels
  manifests: data/manifests
